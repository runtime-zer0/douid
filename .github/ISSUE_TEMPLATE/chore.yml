name: 🔧 Chore
description: 설정, 의존성, 리팩토링, 문서 등 기능 변경 없는 작업
labels: ["chore"]
body:
  - type: dropdown
    id: area
    attributes:
      label: 작업 영역
      options:
        - Frontend (apps/web)
        - Backend (apps/api)
        - Both
        - Repository / CI
    validations:
      required: true
  - type: dropdown
    id: type
    attributes:
      label: 작업 종류
      options:
        - 의존성 업데이트
        - 설정 변경
        - 리팩토링
        - 문서
        - 기타
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: 작업 내용
    validations:
      required: true
  - type: textarea
    id: reason
    attributes:
      label: 이유
      description: 왜 이 작업이 필요한가요?
  - type: textarea
    id: checklist
    attributes:
      label: 체크리스트
      value: |
        - [ ]
