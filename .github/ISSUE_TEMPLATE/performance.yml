name: ⚡ Performance
description: 응답 속도, 쿼리 최적화, 번들 사이즈 등 성능 개선
labels: ["enhancement"]
body:
  - type: dropdown
    id: area
    attributes:
      label: 작업 영역
      options:
        - Frontend (apps/web)
        - Backend (apps/api)
        - Both
    validations:
      required: true
  - type: textarea
    id: current
    attributes:
      label: 현재 상태
      description: 측정값, 병목 위치, 문제가 되는 코드 경로 등
    validations:
      required: true
  - type: textarea
    id: goal
    attributes:
      label: 목표
      description: 어느 수준까지 개선할 건가요?
    validations:
      required: true
  - type: textarea
    id: approach
    attributes:
      label: 접근 방향
      description: 어떤 방법으로 개선할 예정인가요?
  - type: textarea
    id: checklist
    attributes:
      label: 체크리스트
      value: |
        - [ ]
