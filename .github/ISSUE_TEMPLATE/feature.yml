name: ✨ Feature
description: 새 기능 추가 또는 기존 기능 확장
labels: ["enhancement"]
body:
  - type: dropdown
    id: area
    attributes:
      label: 작업 영역
      options:
        - Frontend (apps/web)
        - Backend (apps/api)
        - Both
    validations:
      required: true
  - type: textarea
    id: background
    attributes:
      label: 배경 / 이유
      description: 왜 이 기능이 필요한가요?
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: 구현 범위
      description: 무엇을 만들어야 하나요?
    validations:
      required: true
  - type: textarea
    id: done
    attributes:
      label: 완료 기준
      description: 어떤 상태가 되어야 이슈가 닫히나요?
      value: |
        - [ ]
